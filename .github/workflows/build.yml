name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Configure CMake
        run: cmake -S Core -B Core/build -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build C++ engine
        run: cmake --build Core/build --config Release

      - name: Publish WPF app
        shell: pwsh
        run: |
          $version = (Get-Content version.txt).Trim()
          dotnet publish App/SizeMonitor.App.csproj -c Release -r win-x64 --self-contained true "-p:Version=$version" -o "dist/Canopy"

      - name: Assemble output
        shell: pwsh
        run: |
          $dll = "Core/build/bin/Release/Canopy.Core.dll"
          if (-not (Test-Path $dll)) { $dll = "Core/build/bin/Canopy.Core.dll" }
          Copy-Item $dll "dist/Canopy/Canopy.Core.dll"
          Copy-Item version.txt "dist/Canopy/version.txt"

      - name: Create portable archive
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path "dist/Canopy/*" -DestinationPath "Canopy-$tag.zip"

      - name: Build installer
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$ver" `
            "/DMyOutputBase=Canopy-$tag-setup" `
            installer\canopy.iss

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Canopy-${{ github.ref_name }}.zip
            dist/Canopy-${{ github.ref_name }}-setup.exe
          draft: false
          prerelease: false
